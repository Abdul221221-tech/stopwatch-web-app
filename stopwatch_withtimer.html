<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stop Watch</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* OUTER CONTAINER */
#outerbox{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
}

/* MAIN BOX */
#innerbox{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;

    width: 100%;
    max-width: 340px;
    min-height: 420px;

    padding: 20px;

    background: rgba(0, 0, 0, 0.75);
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

/* TIMER */
#timer{
    color: white;
    font-size: 42px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

/* BUTTON AREA */
#buttons{
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
}

/* ROW */
.row{
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
}

/* BUTTONS */
button{
    flex: 1;
    min-width: 120px;
    height: 45px;

    font-size: 15px;
    font-weight: bold;

    border: none;
    border-radius: 8px;

    cursor: pointer;
    transition: 0.3s ease;
}

/* HOVER EFFECT */
button:hover{
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* BUTTON COLORS */
#Start{
    background: #28a745;
    color: white;
}

#Reset{
    background: #ffc107;
    color: black;
}

#Stop{
    background: #dc3545;
    color: white;
}

#Gettime{
    background: #17a2b8;
    color: white;
}

#cleartime{
    background: #6c757d;
    color: white;
    width: 100%;
}

/* LAP BOX */
#lapBox{
    width: 100%;
    max-height: 130px;
    overflow-y: auto;

    padding: 5px;
}

/* LAP TEXT */
#lapBox p{
    color: white;
    font-size: 14px;
    margin: 3px 0;
    word-break: break-word;
}

/* MOBILE RESPONSIVE */
@media (max-width: 400px){
    button{
        min-width: 100%;
    }

    #timer{
        font-size: 36px;
    }
}
</style>
</head>

<body>

<section id="outerbox">

    <div id="innerbox">

        <h2 id="timer">00</h2>

        <div id="buttons">

            <div class="row">
                <button id="Start">Start</button>
                <button id="Reset">Reset</button>
            </div>

            <div class="row">
                <button id="Stop">Stop</button>
                <button id="Gettime">Get Time</button>
            </div>

            <div class="row">
                <button id="cleartime">Clear</button>
            </div>
<div id="lapBox"></div>
        </div>

    </div>

</section>
<script>


    const timer= document.getElementById("timer")
    const buttons= document.getElementById("buttons")
    const start= document.getElementById("Start")
    const reset= document.getElementById("Reset")
    const Stop= document.getElementById("Stop")
    const Gettime= document.getElementById("Gettime")
    const cleartime= document.getElementById("cleartime")
const lapBox = document.getElementById("lapBox");
     


let count = 0;
let intervalId = null;

// Timer Function
const starttime = () => {
    count++;
    timer.innerText = count;
};

// Start Button
start.addEventListener("click", () => {

    // Agar pehle se chal raha hai to dobara start mat karo
    if (intervalId === null) {

        intervalId=  setInterval(starttime, 1000);  // jb ek baar ye  chekga to interval ki value upadte ho ajyega jitne bar chalega utna value ho jayeg  like 1 ya random hi kuch de dega console

    }

});

 reset.addEventListener("click",()=>{
    clearInterval(intervalId)  // execution ruk jaye jo chl rha hai
    intervalId=null   //   interval id joj kuch arndom aagyi hogi  timer chlne pr use  rest  null krdo so that next jb click kru to fressh stsrt ho
    count=0 //   sount koo reset kr dega 
    timer.innerText=count // ab innner text zero show hoga  

    
 })

Stop.addEventListener("click",()=>{
    clearInterval(intervalId)  //// execution ruk jaye jo chl rha hai
    intervalId=null
    
})


Gettime.addEventListener("click", () => {

    console.log("Current Time:", count);
 const p = document.createElement("p");
    p.innerText = `Lap Time: ${count}`;
    p.style.color = "white";
    p.style.marginTop = "5px";

    lapBox.appendChild(p);

    

});


// Clear Button
cleartime.addEventListener("click", () => {

    console.clear();
    lapBox.innerHTML = "";

});

 






    
</script>

</body>
</html>
